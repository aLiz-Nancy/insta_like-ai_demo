[project]
id = "ai-driven"
name = "ai-driven"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]

[auth.email]
enable_signup = true
# LOCAL DEVELOPMENT ONLY — set enable_confirmations = true in production
enable_confirmations = false

[storage]
enabled = true
file_size_limit = "5MB"
